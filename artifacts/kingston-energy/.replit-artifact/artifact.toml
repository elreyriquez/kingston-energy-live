kind = "web"
previewPath = "/"
title = "Kingston Energy - Waste Management System"
version = "1.0.0"
id = "artifacts/kingston-energy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23401
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/kingston-energy run dev"

[services.env]
PORT = "23401"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/kingston-energy", "run", "build"]
publicDir = "artifacts/kingston-energy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
